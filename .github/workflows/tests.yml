name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Event envelope v1 compatibility
        run: python -m pytest tests/test_event_envelope_v1_contract.py

      - name: Canonical schema contract drift check
        if: matrix.python-version == '3.12'
        run: python scripts/check_canonical_contract.py
